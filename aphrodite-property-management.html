<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aphrodite Property Management - Complete Property Solutions in Cyprus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            color: #333;
            background: #000;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #000000, #1a1a1a, #000000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120, 119, 198, 0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(2deg); }
            66% { transform: translateY(10px) rotate(-1deg); }
        }

        /* Glassmorphism Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header:hover {
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
        }

        .nav-menu a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-menu a:hover::before {
            left: 100%;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        /* Main Content with Smooth Transitions */
        .main-content {
            min-height: 100vh;
            padding-top: 80px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Epic Hero Section */
        .hero {
            background: transparent;
            color: #fff;
            min-height: 90vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .hero-text h1 {
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 2rem;
            letter-spacing: -2px;
            background: linear-gradient(45deg, #fff, #ccc, #fff);
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 3s ease-in-out infinite;
        }

        @keyframes textShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-text .highlight {
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .hero-subtitle {
            font-size: 1.4rem;
            margin-bottom: 3rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            line-height: 1.5;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .hero-image {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            height: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            text-align: center;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .hero-image::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .hero-image:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Spectacular CTA Button */
        .cta-button {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.2));
            color: #fff;
            text-decoration: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
        }

        /* Value Propositions with 3D Effect */
        .value-props {
            padding: 120px 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(10px);
        }

        .value-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 4rem;
            perspective: 1000px;
        }

        .value-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .value-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .value-item:hover::before {
            opacity: 1;
        }

        .value-item:hover {
            transform: translateY(-10px) rotateX(5deg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 80px rgba(255, 255, 255, 0.1);
        }

        .value-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
            line-height: 1.3;
        }

        .value-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Page Headers with Dynamic Effects */
        .page-header {
            padding: 60px 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .page-title {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            color: #fff;
            letter-spacing: -2px;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .page-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 800px;
            margin: 0 auto;
            font-weight: 300;
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        /* Enhanced Service Cards */
        .services-section {
            padding: 60px 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 3rem;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .service-card:hover::before {
            left: 100%;
        }

        .service-card:hover {
            transform: translateY(-15px) scale(1.02);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 80px rgba(255, 255, 255, 0.15);
        }

        .service-image {
            height: 250px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .service-content {
            padding: 3rem;
            color: #fff;
        }

        .service-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }

        .service-price {
            font-size: 1.4rem;
            color: #fff;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .service-features {
            list-style: none;
        }

        .service-features li {
            padding: 0.8rem 0;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            position: relative;
            padding-left: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .service-features li:hover {
            color: #fff;
            transform: translateX(5px);
        }

        .service-features li::before {
            content: '●';
            position: absolute;
            left: 0;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        }

        /* Co-Ownership Special Effects */
        .co-ownership-header {
            padding: 60px 0;
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.9) 0%, rgba(52, 73, 94, 0.8) 100%);
            color: #fff;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .co-ownership-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            animation: stars 20s linear infinite;
        }

        @keyframes stars {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }

        .co-ownership-content {
            padding: 60px 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .problem-statement {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 4rem;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .problem-statement::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: ripple 4s ease-in-out infinite;
        }

        @keyframes ripple {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        .problem-statement h3 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #fff;
            position: relative;
            z-index: 2;
        }

        .problem-statement p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        .solutions-grid-co {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
        }

        .solution-card-co {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .solution-card-co:hover {
            transform: translateY(-10px) rotateY(5deg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 80px rgba(255, 255, 255, 0.1);
        }

        .solution-number {
            background: linear-gradient(45deg, #fff, #f0f0f0);
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .solution-card-co h4 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .solution-card-co p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .solution-benefits {
            list-style: none;
            padding: 0;
        }

        .solution-benefits li {
            padding: 0.5rem 0;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            padding-left: 1.5rem;
            transition: all 0.3s ease;
        }

        .solution-benefits li:hover {
            color: #fff;
            transform: translateX(10px);
        }

        .solution-benefits li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .solution-benefits li:hover::before {
            transform: translateX(5px);
        }

        /* Calculator with Futuristic Design */
        .calculator-header {
            padding: 60px 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(51, 51, 51, 0.8) 100%);
            color: #fff;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .calculator-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: scanner 3s linear infinite;
        }

        @keyframes scanner {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .calculator-content {
            padding: 60px 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .calculator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: start;
        }

        .calculator-form {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(15px);
        }

        .calculator-form h3 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #fff;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .calculate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.3));
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .calculate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .calculate-btn:hover::before {
            left: 100%;
        }

        .calculate-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
        }

        .results-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
            color: #fff;
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .results-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .results-panel h3 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #fff;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        // Enhanced page navigation with smooth transitions
        function showPage(pageId) {
            const mainContent = document.getElementById('main-content');
            
            // Add fade out effect
            mainContent.classList.remove('page-transition', 'active');
            
            setTimeout(() => {
                // Clear current content
                mainContent.innerHTML = '';
                
                // Insert new content
                if (pageContents[pageId]) {
                    mainContent.innerHTML = pageContents[pageId];
                    
                    // Re-initialize calculator if on calculator page
                    if (pageId === 'calculator') {
                        initializeCalculator();
                    }
                }

                // Update navigation active state
                const navLinks = document.querySelectorAll('.nav-link');
                navLinks.forEach(link => {
                    link.classList.remove('active');
                });

                const currentNavLink = document.querySelector(`[onclick="showPage('${pageId}')"]`);
                if (currentNavLink && currentNavLink.classList.contains('nav-link')) {
                    currentNavLink.classList.add('active');
                }

                // Add fade in effect
                mainContent.classList.add('page-transition', 'active');

                // Scroll to top
                window.scrollTo(0, 0);

                // Update page title
                const pageTitles = {
                    'home': 'Aphrodite Property Management - Complete Property Solutions in Cyprus',
                    'services': 'Property Management Services - Aphrodite Property Management',
                    'co-ownership': 'Co-Ownership Solutions - Aphrodite Property Management',
                    'solutions': 'Complete Property Solutions - Aphrodite Property Management',
                    'calculator': 'Property Revenue Calculator - Aphrodite Property Management',
                    'about': 'About Our Founders - Aphrodite Property Management',
                    'contact': 'Contact Us - Aphrodite Property Management'
                };

                if (pageTitles[pageId]) {
                    document.title = pageTitles[pageId];
                }
            }, 300);
        }

        // Initialize calculator functionality
        function initializeCalculator() {
            const calculatorForm = document.getElementById('propertyCalculator');
            if (calculatorForm) {
                calculatorForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Get form values
                    const location = document.getElementById('location').value;
                    const propertyType = document.getElementById('propertyType').value;
                    const bedrooms = parseInt(document.getElementById('bedrooms').value);
                    const area = parseInt(document.getElementById('area').value);
                    const condition = document.getElementById('condition').value;
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const phone = document.getElementById('phone').value;

                    // Basic validation
                    if (!location || !propertyType || !area || !name || !email || !phone) {
                        alert('Please fill in all required fields');
                        return;
                    }

                    // Calculate property value (simplified algorithm)
                    let basePrice = 0;
                    const locationMultipliers = {
                        'nicosia': 1.2,
                        'limassol': 1.5,
                        'larnaca': 1.0,
                        'paphos': 1.1,
                        'famagusta': 0.9
                    };

                    const typeMultipliers = {
                        'apartment': 2500,
                        'villa': 3500,
                        'townhouse': 3000,
                        'commercial': 4000
                    };

                    const conditionMultipliers = {
                        'excellent': 1.2,
                        'good': 1.0,
                        'average': 0.8,
                        'needs-renovation': 0.6
                    };

                    basePrice = area * typeMultipliers[propertyType] * locationMultipliers[location] * conditionMultipliers[condition];
                    
                    // Add bedroom premium for residential
                    if (propertyType !== 'commercial') {
                        basePrice += bedrooms * 15000;
                    }

                    const marketValue = Math.round(basePrice);
                    const monthlyRent = Math.round(marketValue * 0.006); // 0.6% monthly yield
                    const annualYield = 7.2; // 7.2% annual yield
                    const managementFee = Math.round(monthlyRent * 0.12); // 12% management fee
                    const netIncome = monthlyRent - managementFee;
                    const airbnbIncome = Math.round(monthlyRent * 1.4); // 40% premium for Airbnb

                    // Display results with animation
                    setTimeout(() => {
                        document.getElementById('marketValue').textContent = '€' + marketValue.toLocaleString();
                        document.getElementById('monthlyRent').textContent = '€' + monthlyRent.toLocaleString();
                        document.getElementById('annualYield').textContent = annualYield + '%';
                        document.getElementById('netIncome').textContent = '€' + netIncome.toLocaleString();
                        document.getElementById('airbnbIncome').textContent = '€' + airbnbIncome.toLocaleString();

                        // Show results panel with animation
                        const resultsPanel = document.getElementById('resultsPanel');
                        resultsPanel.style.display = 'block';
                        resultsPanel.style.opacity = '0';
                        resultsPanel.style.transform = 'translateY(20px)';
                        
                        setTimeout(() => {
                            resultsPanel.style.transition = 'all 0.6s ease';
                            resultsPanel.style.opacity = '1';
                            resultsPanel.style.transform = 'translateY(0)';
                        }, 100);

                        // Scroll to results
                        resultsPanel.scrollIntoView({ 
                            behavior: 'smooth',
                            block: 'center'
                        });

                        console.log('Lead captured:', { name, email, phone, location, propertyType, area, marketValue, monthlyRent });
                    }, 500);
                });
            }
        }

        // Initialize page with enhanced loading
        document.addEventListener('DOMContentLoaded', function() {
            // Create particles
            createParticles();
            
            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
                showPage('home');
            }, 2000);
        });

        // Enhanced header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.header');
            if (window.scrollY > 100) {
                header.style.background = 'rgba(255, 255, 255, 0.08)';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.2)';
            } else {
                header.style.background = 'rgba(255, 255, 255, 0.05)';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.1)';
            }
        });

        // Add mouse movement parallax effect
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            const bg = document.querySelector('.animated-bg');
            if (bg) {
                bg.style.transform = `translate(${mouseX * 20}px, ${mouseY * 20}px)`;
            }
        });

        // Add intersection observer for animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'fadeInUp 0.8s ease forwards';
                }
            });
        }, observerOptions);

        // Observe elements for animation
        setInterval(() => {
            document.querySelectorAll('.value-item, .service-card, .solution-card, .solution-card-co, .founder-card').forEach(el => {
                if (el && !el.hasAttribute('data-observed')) {
                    observer.observe(el);
                    el.setAttribute('data-observed', 'true');
                }
            });
        }, 1000);
    </script>
